name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  backend:
    name: backend (fmt / clippy / test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jitacart
          POSTGRES_PASSWORD: jitacart
          POSTGRES_DB: jitacart
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jitacart"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://jitacart:jitacart@localhost:5432/jitacart
      SQLX_OFFLINE: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features
      - run: cargo test --all-features

  frontend:
    name: frontend (svelte-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check

  audit-backend:
    name: backend cargo audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo install cargo-audit --locked
      # RUSTSEC-2023-0071 (Marvin): sqlx-macros-core unconditionally
      # pulls in sqlx-mysql + rsa for offline-cache support, even
      # though we only enable the `postgres` feature. rsa is a
      # build-time dep here — never reaches the runtime binary — and
      # upstream has no fixed release. Re-evaluate when a non-vulnerable
      # rsa is published or when sqlx-macros-core stops pulling in the
      # mysql backend unconditionally.
      - run: cargo audit --ignore RUSTSEC-2023-0071

  audit-frontend:
    name: frontend npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  env-lint:
    name: env-lint (.env.example drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-env-example.sh

  secret-scan:
    name: secret-scan (gitleaks + working tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Belt-and-braces: refuse a tracked file literally named `.env`
      # (or `.env.<env>`), in case gitleaks' ruleset somehow doesn't
      # flag it. Gitleaks already handles entropy-based secret
      # detection inside other files, so we don't try to second-guess
      # it with a grep here.
      - name: refuse tracked .env files
        run: |
          set -e
          if git ls-files \
              | grep -E '(^|/)\.env($|\.[^.]+$)' \
              | grep -vE '\.env\.(example|sample|template)$' \
              | grep .; then
              echo "Real .env file checked in — refuse." >&2
              exit 1
          fi

  build-images:
    name: build & push images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - name: backup
            context: ./backup
            dockerfile: ./backup/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jitacart-${{ matrix.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
