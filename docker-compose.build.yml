# Build override: restores the `build:` blocks the prod compose file
# omits, and re-tags each built image with a mutable ref so dev
# iteration works against digest-pinned production references.
#
# `docker-compose.yml` digest-pins each image (`:vX.Y.Z@sha256:...`)
# for audit-trail / rollback reasons. Digest-pinned references cannot
# be retagged — `docker build -t ...@sha256:...` is a hard error — so
# this override replaces every `image:` field with a plain `:dev` (or
# `:${JC_IMAGE_TAG}`) tag that a local build can produce.
#
#     docker compose -f docker-compose.yml -f docker-compose.build.yml build
#
# `JC_IMAGE_OWNER` / `JC_IMAGE_TAG` default the same way as the prod
# file, so a plain `up -d` after a build picks up the locally-tagged
# image without touching the registry.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/${JC_IMAGE_OWNER:-idknerdyshit}/jitacart-backend:${JC_IMAGE_TAG:-dev}

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/${JC_IMAGE_OWNER:-idknerdyshit}/jitacart-backend:${JC_IMAGE_TAG:-dev}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/${JC_IMAGE_OWNER:-idknerdyshit}/jitacart-frontend:${JC_IMAGE_TAG:-dev}

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    image: ghcr.io/${JC_IMAGE_OWNER:-idknerdyshit}/jitacart-backup:${JC_IMAGE_TAG:-dev}
