# Production stack: postgres + api + worker + frontend + caddy + backup.
#
# Image-only by design. CI publishes built images to GHCR; prod just
# pulls and restarts:
#     scripts/deploy.sh
# (or `docker compose pull && docker compose up -d` if you don't want
# the healthcheck-driven rollback).
#
# Every image line is digest-pinned so `git revert` is the rollback
# button and the audit trail is in the tree, not in whatever Docker
# Hub serves today. The pin-digests CI job rewrites the four
# jitacart-* image lines on `main` immediately after each `vX.Y.Z`
# tag, so the standard deploy is just:
#     git pull --ff-only
#     scripts/deploy.sh
# See DEPLOY.md § Manual digest pinning for the escape-hatch flow.
#
# To build images locally (hotfix from a non-CI box, dev iteration):
#     docker compose -f docker-compose.yml -f docker-compose.build.yml build
# The build override replaces digest-pinned `image:` fields with
# retaggable mutable refs — digest-pinned forms cannot be retagged.
#
# For local Postgres-only development, use the dev override:
#     docker compose -f docker-compose.dev.yml up
#
# All services restart unless stopped, log via the json-file driver
# with rotation, and the app processes run as non-root.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Least-privilege defaults for the app containers (api, worker, frontend,
# backup). All four already run as a non-root uid in their images; this
# adds the defense-in-depth on top: no privilege escalation, zero Linux
# caps (none of them bind privileged ports or touch devices), and a
# read-only root filesystem with a tmpfs for the only path that needs
# writes (/tmp — Rust/Node scratch, and backup's mktemp .pgpass).
# postgres and caddy can't take all of this (root-owned data dir init,
# privileged-port bind) and are hardened inline below.
x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp

services:
  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: unless-stopped
    # No cap_drop / read_only here: the official entrypoint starts as
    # root to init/chown the data dir and gosu-drops to the postgres
    # user. no-new-privileges is still safe — gosu uses the setuid()
    # syscall as an already-root process, not a setuid binary.
    security_opt:
      - no-new-privileges:true
    environment:
      # The bootstrap superuser is deliberately NOT `jitacart` — a superuser
      # bypasses all RLS, so it must never be reachable from a runtime
      # DATABASE_URL. Runtime code connects only as jitacart_{app,worker,backup}.
      POSTGRES_USER: jitacart_bootstrap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: jitacart
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?set APP_DB_PASSWORD in .env}
      WORKER_DB_PASSWORD: ${WORKER_DB_PASSWORD:?set WORKER_DB_PASSWORD in .env}
      BACKUP_DB_PASSWORD: ${BACKUP_DB_PASSWORD:?set BACKUP_DB_PASSWORD in .env}
    volumes:
      - jitacart-pgdata:/var/lib/postgresql/data
      # Runs once on a fresh data dir to create the RLS roles. Idempotent
      # on subsequent restarts: the entrypoint only invokes
      # /docker-entrypoint-initdb.d/ when the cluster is being initialized.
      - ./scripts/init-roles.sh:/docker-entrypoint-initdb.d/00-init-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jitacart_bootstrap -d jitacart"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  api:
    <<: *hardening
    # CI's pin-digests job rewrites this to X.Y.Z@sha256:... on each
    # release (the image tag drops the git tag's `v` prefix). Pre-
    # first-release this tracks :latest mutably and scripts/deploy.sh
    # will refuse to roll until the first pin lands.
    image: ghcr.io/${JC_IMAGE_OWNER:-idknerdyshit}/jitacart-backend:0.2.0@sha256:3a82fa7a4c62909288ce8ad8373d08a2ee5f73aa27140c0f55ed494b6b326a3d
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # Migration runner uses the admin role (table owner; runs CREATE/ALTER);
      # all runtime queries go through jitacart_app, which is gated by RLS.
      ADMIN_DATABASE_URL: postgres://jitacart_admin:${POSTGRES_PASSWORD}@postgres:5432/jitacart
      DATABASE_URL: postgres://jitacart_app:${APP_DB_PASSWORD}@postgres:5432/jitacart
      SERVER__BIND: 0.0.0.0:8080
      # METRICS__BIND is intentionally NOT set here: an inline `environment`
      # value wins over `.env`, so setting it would make the operator's
      # .env override silently ineffective. It comes from `.env` (env_file)
      # when present, else the binary's own default (127.0.0.1:9090 — a
      # loopback bind Caddy does not proxy; scrape via `docker compose exec
      # api curl 127.0.0.1:9090/metrics` or a same-netns sidecar).
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker:
    <<: *hardening
    # Same backend image as api; keep them at the same digest.
    image: ghcr.io/${JC_IMAGE_OWNER:-idknerdyshit}/jitacart-backend:0.2.0@sha256:3a82fa7a4c62909288ce8ad8373d08a2ee5f73aa27140c0f55ed494b6b326a3d
    command: ["jitacart-worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # Worker connects as jitacart_worker (BYPASSRLS) — it operates across
      # tenants by design (price refresh, contract sync, webhook drain, …).
      DATABASE_URL: postgres://jitacart_worker:${WORKER_DB_PASSWORD}@postgres:5432/jitacart
      WORKER__HEALTHZ_BIND: 127.0.0.1:9091
    expose:
      - "9091"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  frontend:
    <<: *hardening
    image: ghcr.io/${JC_IMAGE_OWNER:-idknerdyshit}/jitacart-frontend:0.2.0@sha256:4ae77c90e83d9a0a840ec572f8a517f4965370d54b9b8f6bf67227bbb8995f99
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  caddy:
    image: caddy:2-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    restart: unless-stopped
    # Caddy runs as root to bind :80/:443 and run ACME; drop every cap
    # except the one that buys — binding privileged ports. Not read_only:
    # its writable state (/data, /config) is on named volumes, but the
    # upstream image isn't validated for a read-only rootfs and TLS is
    # too important to gamble on.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    environment:
      JC_DOMAIN: ${JC_DOMAIN:?set JC_DOMAIN in .env (e.g. jitacart.example.com or :80 for HTTP-only testing)}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    # Lets the Caddyfile's conf.d vhosts reach host-published ports —
    # specifically a co-located staging stack on JC_STAGING_HTTP_PORT.
    # Harmless when no conf.d/*.caddy file is present.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Optional extra vhosts (e.g. staging.<domain>). Empty by default;
      # see caddy/conf.d/staging.caddy.example.
      - ./caddy/conf.d:/etc/caddy/conf.d:ro
      - caddy-data:/data
      - caddy-config:/config
    logging: *default-logging

  # Nightly Postgres → age → S3 backup runner. Runs by default; if
  # BACKUP_AGE_RECIPIENT / BACKUP_RCLONE_REMOTE are unset, the container
  # stays Up with a single WARN line so the missing config is visible
  # in `docker compose ps` rather than silently absent.
  backup:
    <<: *hardening
    image: ghcr.io/${JC_IMAGE_OWNER:-idknerdyshit}/jitacart-backup:0.2.0@sha256:bd21b6cf586825ec2936cac82277a9e6693ef0c37af2c75530396f90af78bf5c
    restart: unless-stopped
    # Overrides the *hardening tmpfs: backup also needs a writable HOME
    # for rclone's config/cache dir probing (it streams, but still
    # touches ~/.config/rclone). /tmp carries the mktemp .pgpass.
    tmpfs:
      - /tmp
      - /home/jitacart
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: jitacart
      # Nightly backup connects as a SELECT-only, BYPASSRLS role: pg_dump can
      # read every tenant's rows but a compromised backup container cannot
      # mutate or delete anything.
      POSTGRES_USER: jitacart_backup
      POSTGRES_PASSWORD: ${BACKUP_DB_PASSWORD:?set BACKUP_DB_PASSWORD in .env}
      # restore.sh needs write access, so it connects as the table owner
      # (jitacart_admin, whose password is POSTGRES_PASSWORD) rather than the
      # read-only backup role. Only consumed by `... run --rm backup restore`.
      RESTORE_DB_USER: jitacart_admin
      RESTORE_DB_PASSWORD: ${POSTGRES_PASSWORD}
      RCLONE_CONFIG: /config/rclone.conf
    volumes:
      - ./backup/rclone.conf:/config/rclone.conf:ro
    logging: *default-logging

volumes:
  jitacart-pgdata:
  caddy-data:
  caddy-config:
