# Production stack: postgres + api + worker + frontend + caddy + backup.
#
# Image-only by design. CI publishes built images to GHCR; prod just
# pulls and restarts:
#     scripts/deploy.sh
# (or `docker compose pull && docker compose up -d` if you don't want
# the healthcheck-driven rollback).
#
# Every image line is digest-pinned so `git revert` is the rollback
# button and the audit trail is in the tree, not in whatever Docker
# Hub serves today. To take a new release:
#     scripts/bump-image-digests.sh vX.Y.Z   # rewrites the digests
#     git commit                              # captures the new state
#     scripts/deploy.sh                       # pull + up + verify
#
# To build images locally (hotfix from a non-CI box, dev iteration):
#     docker compose -f docker-compose.yml -f docker-compose.build.yml build
# The build override replaces digest-pinned `image:` fields with
# retaggable mutable refs — digest-pinned forms cannot be retagged.
#
# For local Postgres-only development, use the dev override:
#     docker compose -f docker-compose.dev.yml up
#
# All services restart unless stopped, log via the json-file driver
# with rotation, and the app processes run as non-root.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: unless-stopped
    environment:
      POSTGRES_USER: jitacart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: jitacart
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?set APP_DB_PASSWORD in .env}
      WORKER_DB_PASSWORD: ${WORKER_DB_PASSWORD:?set WORKER_DB_PASSWORD in .env}
    volumes:
      - jitacart-pgdata:/var/lib/postgresql/data
      # Runs once on a fresh data dir to create the RLS roles. Idempotent
      # on subsequent restarts: the entrypoint only invokes
      # /docker-entrypoint-initdb.d/ when the cluster is being initialized.
      - ./scripts/init-roles.sh:/docker-entrypoint-initdb.d/00-init-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jitacart -d jitacart"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  api:
    # Digest-pin via scripts/bump-image-digests.sh vX.Y.Z. Until then,
    # this tracks :latest mutably — first deploy MUST run the script.
    image: ghcr.io/${JC_IMAGE_OWNER:-eyedeekay}/jitacart-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # Migration runner uses the admin role (table owner; runs CREATE/ALTER);
      # all runtime queries go through jitacart_app, which is gated by RLS.
      ADMIN_DATABASE_URL: postgres://jitacart_admin:${POSTGRES_PASSWORD}@postgres:5432/jitacart
      DATABASE_URL: postgres://jitacart_app:${APP_DB_PASSWORD}@postgres:5432/jitacart
      SERVER__BIND: 0.0.0.0:8080
      # Loopback only; scrape via `docker compose exec api curl
      # 127.0.0.1:9090/metrics` or a sidecar in the same netns.
      # Caddy does not proxy this port.
      METRICS__BIND: 127.0.0.1:9090
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker:
    # Same backend image as api; keep them at the same digest.
    image: ghcr.io/${JC_IMAGE_OWNER:-eyedeekay}/jitacart-backend:latest
    command: ["jitacart-worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # Worker connects as jitacart_worker (BYPASSRLS) — it operates across
      # tenants by design (price refresh, contract sync, webhook drain, …).
      DATABASE_URL: postgres://jitacart_worker:${WORKER_DB_PASSWORD}@postgres:5432/jitacart
      WORKER__HEALTHZ_BIND: 127.0.0.1:9091
    expose:
      - "9091"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  frontend:
    image: ghcr.io/${JC_IMAGE_OWNER:-eyedeekay}/jitacart-frontend:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  caddy:
    image: caddy:2-alpine@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    environment:
      JC_DOMAIN: ${JC_DOMAIN:?set JC_DOMAIN in .env (e.g. jitacart.example.com or :80 for HTTP-only testing)}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    logging: *default-logging

  # Nightly Postgres → age → S3 backup runner. Runs by default; if
  # BACKUP_AGE_RECIPIENT / BACKUP_RCLONE_REMOTE are unset, the container
  # stays Up with a single WARN line so the missing config is visible
  # in `docker compose ps` rather than silently absent.
  backup:
    image: ghcr.io/${JC_IMAGE_OWNER:-eyedeekay}/jitacart-backup:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: jitacart
      POSTGRES_DB: jitacart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RCLONE_CONFIG: /config/rclone.conf
    volumes:
      - ./backup/rclone.conf:/config/rclone.conf:ro
    logging: *default-logging

volumes:
  jitacart-pgdata:
  caddy-data:
  caddy-config:
