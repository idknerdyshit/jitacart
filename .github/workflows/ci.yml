name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  backend:
    name: backend (fmt / clippy / test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          # Bootstrap superuser — matches the prod compose stack so tests
          # exercise the same role topology. Runtime roles (jitacart_app,
          # jitacart_worker) are created by the migration.
          POSTGRES_USER: jitacart_bootstrap
          POSTGRES_PASSWORD: jitacart
          POSTGRES_DB: jitacart
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jitacart_bootstrap"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://jitacart_bootstrap:jitacart@localhost:5432/jitacart
      SQLX_OFFLINE: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      # dtolnay/rust-toolchain selects the toolchain from the ref by
      # default (`@stable`, `@nightly`); when pinning to a SHA we have
      # to pass `toolchain:` explicitly.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable branch HEAD as of 2026-05
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: backend
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features
      - run: cargo test --all-features

  frontend:
    name: frontend (svelte-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check

  audit-backend:
    name: backend cargo audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable branch HEAD as of 2026-05
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: backend
      - run: cargo install cargo-audit --locked
      # RUSTSEC-2023-0071 (Marvin): sqlx-macros-core unconditionally
      # pulls in sqlx-mysql + rsa for offline-cache support, even
      # though we only enable the `postgres` feature. rsa is a
      # build-time dep here — never reaches the runtime binary — and
      # upstream has no fixed release. Re-evaluate when a non-vulnerable
      # rsa is published or when sqlx-macros-core stops pulling in the
      # mysql backend unconditionally.
      - run: cargo audit --ignore RUSTSEC-2023-0071

  audit-frontend:
    name: frontend npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high

  env-lint:
    name: env-lint (.env.example drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - run: bash scripts/check-env-example.sh

  secret-scan:
    name: secret-scan (gitleaks + working tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Belt-and-braces: refuse a tracked file literally named `.env`
      # (or `.env.<env>`), in case gitleaks' ruleset somehow doesn't
      # flag it. Gitleaks already handles entropy-based secret
      # detection inside other files, so we don't try to second-guess
      # it with a grep here.
      - name: refuse tracked .env files
        run: |
          set -eo pipefail
          if git ls-files \
              | grep -E '(^|/)\.env($|\.[^.]+$)' \
              | grep -vE '\.env\.(example|sample|template)$' \
              | grep .; then
              echo "Real .env file checked in — refuse." >&2
              exit 1
          fi

  build-images:
    name: build ${{ matrix.image.name }} (${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    if: startsWith(github.ref, 'refs/tags/v')
    # Wait on every gate that could block a release before we push
    # images to ghcr — audit failures and secret-scan failures must
    # stop publication, not race it. `merge-images`, `pin-digests`,
    # and `release` all chain after this and inherit the gate.
    needs: [backend, frontend, audit-backend, audit-frontend, secret-scan]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # Each {image} is built once per {platform} on a native runner
        # — no QEMU. The arm64 leg in particular (the Rust backend
        # under emulation was the slowest job in the release pipeline)
        # now runs on a real arm64 host. merge-images stitches the
        # per-arch pushes into one multi-arch index afterward.
        image:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - name: backup
            context: ./backup
            dockerfile: ./backup/Dockerfile
        platform:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jitacart-${{ matrix.image.name }}
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/${{ matrix.platform.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          # Push by digest only — no tags here. merge-images applies
          # the semver/latest tags to the assembled multi-arch index.
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/jitacart-${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          # Cache scope is per image AND per arch: an amd64 layer is
          # useless to an arm64 build, and a shared scope would have
          # the two legs clobbering each other.
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
          # mode=min exports only the final stage's cache. mode=max
          # also exports intermediate layers (including the cargo
          # registry cache mount), which can poison subsequent builds
          # if a previous run died mid-unpack — see jitacart#1.
          cache-to: type=gha,mode=min,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
      # Hand the per-arch digest to merge-images via an artifact. The
      # file name is the bare digest (sha256: prefix stripped); the
      # merge job globs the directory and re-adds the prefix.
      - name: export digest
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digest-${{ matrix.image.name }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-images:
    name: merge multi-arch ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-images]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        name: [backend, frontend, backup]
    steps:
      # Pull both per-arch digest artifacts for this image into one
      # flat directory.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.name }}-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jitacart-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      # Assemble the multi-arch index: tag it with the metadata-action
      # tags, pointing at the per-arch digests pushed by build-images.
      - name: create multi-arch manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/jitacart-${{ matrix.name }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)
      # Echo the multi-arch index digest into the job log so a human
      # can grep CI output if the release-body lookup ever fails. The
      # release job re-queries via `docker buildx imagetools inspect`
      # — that's the source of truth in the release body.
      - name: inspect
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/jitacart-${{ matrix.name }}
        run: docker buildx imagetools inspect "${IMAGE}:${{ steps.meta.outputs.version }}"

  pin-digests:
    name: pin digests to main
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [merge-images]
    permissions:
      contents: write
      packages: read
    steps:
      # Land on main and grab full history so we can rebase if a merge
      # raced this job. We rewrite docker-compose.yml here, not on the
      # tagged commit — the tag is "intent to release"; the pin commit
      # that lands on main right after is what `scripts/deploy.sh`
      # actually consumes.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: bump digests
        env:
          TAG: ${{ github.ref_name }}
          JC_IMAGE_OWNER: ${{ github.repository_owner }}
        run: scripts/bump-image-digests.sh "$TAG"
      - name: commit + push
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet -- docker-compose.yml; then
            echo "no digest changes — main already pinned to $TAG"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          # Without [skip ci] this push would re-run build-images and
          # re-enter pin-digests, looping until something fails.
          git commit -m "Release: pin images to ${TAG} [skip ci]"
          # If someone pushed to main while build-images was running,
          # rebase the pin onto their commit. A conflict means somebody
          # hand-edited image: lines concurrently — abort cleanly so
          # the local commit isn't stranded, then surface to an operator.
          git pull --rebase origin main || { git rebase --abort; exit 1; }
          git push origin main

  release:
    name: github release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # Wait for pin-digests so the release notes' "pinned into
    # docker-compose.yml on main" claim is true by the time the
    # release page goes live.
    needs: [merge-images, pin-digests]
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          NOTES_FILE="$(mktemp)"
          # Resolve the multi-arch index digest for each image. This
          # is the same digest scripts/bump-image-digests.sh writes
          # into docker-compose.yml. Surfacing it in the release body
          # means an operator can verify what they're pinning to
          # before touching the compose file.
          {
            echo "## Container images"
            echo
            echo "These references are also pinned into \`docker-compose.yml\` on \`main\` by the pin-digests CI job."
            echo
            for img in backend frontend backup; do
              ref="ghcr.io/${OWNER}/jitacart-${img}:${VERSION}"
              # Read docker's output into a variable first so the pipe to
              # awk can't SIGPIPE docker mid-stream — under `set -e +
              # pipefail`, that surfaces as a 141 from the pipeline and
              # kills the whole script. The `Digest:` line is what we
              # actually want (multi-arch index digest); the `Name:` line
              # only repeats the input ref with no @sha256.
              inspect_out=$(docker buildx imagetools inspect "$ref" || true)
              digest=$(printf '%s\n' "$inspect_out" | awk '/^Digest:/ { print $2; exit }')
              if [[ -z "$digest" ]]; then
                echo "- \`${ref}\`  *(digest lookup failed)*"
              else
                echo "- \`${ref}@${digest}\`"
              fi
            done
          } > "$NOTES_FILE"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --notes-file "$NOTES_FILE"
