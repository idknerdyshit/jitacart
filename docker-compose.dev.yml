# Distinct project name so the dev stack's volumes, network, and container
# names never share a namespace with the prod-style docker-compose.yml stack
# on the same host.
name: jitacart-dev

services:
  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: unless-stopped
    environment:
      POSTGRES_USER: jitacart
      POSTGRES_PASSWORD: jitacart
      POSTGRES_DB: jitacart
      # Local dev: use the same trivial password across all three roles so the
      # default .env.example DSNs work out of the box.
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-jitacart}
      WORKER_DB_PASSWORD: ${WORKER_DB_PASSWORD:-jitacart}
    ports:
      # Localhost-only: the dev DB ships trivial jitacart/jitacart creds, so
      # keep it off the LAN. Still reachable for host-run cargo/tests.
      - "127.0.0.1:5432:5432"
    volumes:
      - jitacart-pgdata-dev:/var/lib/postgresql/data
      - ./scripts/init-roles.sh:/docker-entrypoint-initdb.d/00-init-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jitacart -d jitacart"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  # Distinct from the prod-style stack's jitacart-pgdata so the two never
  # share a Postgres volume on the same host.
  jitacart-pgdata-dev:
